strategy:
  class_name: "gnomepy_research.sessions.n_exchange_arb.strategy:NExchangeArb"
  args:
    size: 100000
    max_position: 5
    entry_threshold_bps: 2.0
    close_threshold_bps: 0.5
    max_imbalance_ticks: 150
    max_staleness_ns: 60000000000
    warmup_ticks: 50
    processing_time_ns: 0

start_date: "2026-05-12T23:28:00"
end_date: "2026-05-13T19:50:00"

listings:
