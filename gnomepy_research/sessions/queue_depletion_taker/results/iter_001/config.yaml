strategy:
  class_name: "gnomepy_research.sessions.queue_depletion_taker.strategy:QueueDepletionTaker"
  args:
    exchange_id: 1
    security_id: 1
    size: 1
    max_position: 10
    entry_threshold: 0.3
    exit_threshold: 0.1
    stop_loss_bps: 15.0
    take_profit_bps: 20.0
    cooldown_ticks: 50
    warmup_ticks: 50
    flow_horizon_ns: 500000000
    liq_horizon_ns: 1000000000
    w_imbalance: 0.5
    w_staleness: 0.25
    w_liq_delta: 0.25
    toxicity_threshold_bps: 8.0

start_date: "2026-05-13T07:00:00"
end_date: "2026-05-13T16:00:00"

listings:
  - listing_id: 1
    profile: default

profiles:
  default:
    fee_model:
      type: static
      taker_fee: 0.0005
      maker_fee: 0.00012
    network_latency:
      type: static
      latency_nanos: 5000000
    order_processing_latency:
      type: static
      latency_nanos: 1000000
    queue_model:
      type: risk_averse
