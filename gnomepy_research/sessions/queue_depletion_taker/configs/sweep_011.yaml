strategy:
  class_name: "gnomepy_research.sessions.queue_depletion_taker.strategy:QueueDepletionTaker"
  args:
    exchange_id: 1
    security_id: 1
    size: 100
    max_position: 10
    entry_threshold: [0.20, 0.25, 0.30]
    exit_threshold: 0.05
    stop_loss_bps: [6.0, 8.0, 10.0]
    take_profit_bps: [10.0, 12.0, 15.0]
    cooldown_ticks: [300, 500, 750]
    warmup_ticks: 50
    flow_horizon_ns: 500000000
    liq_horizon_ns: 1000000000
    w_imbalance: 0.5
    w_staleness: 0.25
    w_liq_delta: 0.25
    toxicity_threshold_bps: 8.0
    session_start_hour: 0

start_date: "2026-05-13T07:00:00"
end_date: "2026-05-15T16:00:00"

listings:
  - listing_id: 1
    profile: default

profiles:
  default:
    fee_model:
      type: static
      taker_fee: 0.0005
      maker_fee: 0.00012
    network_latency:
      type: static
      latency_nanos: 5000000
    order_processing_latency:
      type: static
      latency_nanos: 1000000
    queue_model:
      type: risk_averse
