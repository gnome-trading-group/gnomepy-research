strategy:
  class_name: "gnomepy_research.sessions.stablecoin_stat_arb.strategy:StablecoinStatArb"
  args:
    size: 1000
    max_position: 5
    halflife_seconds: 90.0
    warmup_ticks: 50
    entry_z: [0.875, 1.0, 1.125]
    close_z: -1.0
    max_hold_ns: 600000000000
    max_imbalance_ticks: 20
    max_staleness_ns: 60000000000
    min_spread_bps: 0.25
    reversion_ticks: [1, 2, 3, 4, 5]
    processing_time_ns: 0

start_date: "2026-05-13T00:00:00"
end_date: "2026-05-16T00:00:00"

listings:
  - listing_id: 1
    profile: default
  - listing_id: 28
    profile: default

profiles:
  default:
    fee_model:
      type: static
      taker_fee: 0.0004
      maker_fee: 0.00012
    network_latency:
      type: static
      latency_nanos: 5000000
    order_processing_latency:
      type: static
      latency_nanos: 1000000
    queue_model:
      type: risk_averse
