strategy:
  class_name: "gnomepy_research.strategies.market_maker:MarketMaker"
  args:
    exchange_id: 1
    security_id: 1
    size: 100000
    max_position: 10
    gamma: 2.0
    delta: 4.0
    min_spread_bps: 0.05
    warmup_ticks: 100
    processing_time_ns: 500000

listings:
  - listing_id: 1
    profile: default

profiles:
  default:
    fee_model:
      type: static
      taker_fee: 0.0005
      maker_fee: -0.0001
    network_latency:
      type: static
      latency_nanos: 5000000
    order_processing_latency:
      type: static
      latency_nanos: 1000000
    queue_model:
      type: risk_averse

s3:
  bucket: gnome-market-data-prod
